<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký Tài Khoản</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }
    
    #regForm {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    label {
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    
    input[type="text"],
    input[type="password"],
    input[type="file"] {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }
    
    input[type="text"]:invalid:not(:placeholder-shown),
    input[type="password"]:invalid:not(:placeholder-shown) {
      border-color: #e74c3c;
    }
    
    .error-message {
      color: #e74c3c;
      font-size: 12px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    #strength {
      padding: 8px 12px;
      border-radius: 5px;
      font-weight: 600;
      font-size: 14px;
      text-align: center;
      background-color: #ffebee;
      color: #e74c3c;
    }
    
    #strength.medium {
      background-color: #fff3cd;
      color: #f39c12;
    }
    
    #strength.strong {
      background-color: #d4edda;
      color: #27ae60;
    }
    
    .image-preview {
      width: 100px;
      height: 100px;
      border: 2px dashed #ddd;
      border-radius: 5px;
      display: none;
      object-fit: cover;
      margin-top: 10px;
    }
    
    .image-preview.show {
      display: block;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .success-message {
      background-color: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 5px;
      text-align: center;
      display: none;
      margin-bottom: 15px;
      border: 1px solid #c3e6cb;
    }
    
    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Đăng Ký Tài Khoản</h1>
    
    <div class="success-message" id="successMsg"></div>
    
    <form id="regForm">
      <div class="form-group">
        <label for="user">Username (5-15 ký tự)</label>
        <input type="text" id="user" placeholder="Nhập username" minlength="5" maxlength="15" required>
        <div class="error-message" id="userError"></div>
      </div>
      
      <div class="form-group">
        <label for="pass">Password (phải có số và chữ)</label>
        <input type="password" id="pass" placeholder="Nhập mật khẩu" required>
        <div class="error-message" id="passError"></div>
        <div id="strength">Độ mạnh: Yếu</div>
      </div>
      
      <div class="form-group">
        <label for="pic">Ảnh đại diện (JPG/PNG)</label>
        <input type="file" id="pic" accept=".jpg,.jpeg,.png">
        <img id="imagePreview" class="image-preview" alt="Ảnh xem trước">
        <div class="error-message" id="picError"></div>
      </div>
      
      <button type="submit">Đăng Ký</button>
    </form>
  </div>

  <script>
    const regForm = document.getElementById('regForm');
    const userInput = document.getElementById('user');
    const passInput = document.getElementById('pass');
    const picInput = document.getElementById('pic');
    const strengthDiv = document.getElementById('strength');
    const imagePreview = document.getElementById('imagePreview');
    const successMsg = document.getElementById('successMsg');
    
    // Kiểm tra độ mạnh mật khẩu
    passInput.addEventListener('input', function() {
      const val = this.value;
      const hasNumber = /[0-9]/.test(val);
      const hasLetter = /[a-zA-Z]/.test(val);
      const length = val.length;
      
      let strength = 'Yếu';
      let strengthClass = '';
      
      if (length > 8 && hasNumber && hasLetter) {
        strength = 'Mạnh';
        strengthClass = 'strong';
      } else if (length > 4 && hasNumber && hasLetter) {
        strength = 'Trung bình';
        strengthClass = 'medium';
      }
      
      strengthDiv.innerText = 'Độ mạnh: ' + strength;
      strengthDiv.className = strengthClass;
    });
    
    // Xem trước ảnh
    picInput.addEventListener('change', function() {
      const file = this.files[0];
      const picError = document.getElementById('picError');
      
      if (file) {
        const validTypes = ['image/jpeg', 'image/png'];
        if (!validTypes.includes(file.type)) {
          picError.textContent = 'Chỉ chấp nhận file JPG hoặc PNG';
          picError.classList.add('show');
          this.value = '';
          imagePreview.classList.remove('show');
          return;
        }
        
        picError.classList.remove('show');
        const reader = new FileReader();
        reader.onload = function(e) {
          imagePreview.src = e.target.result;
          imagePreview.classList.add('show');
        };
        reader.readAsDataURL(file);
      } else {
        imagePreview.classList.remove('show');
      }
    });
    
    // Xử lý form submission
    regForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      let isValid = true;
      const userError = document.getElementById('userError');
      const passError = document.getElementById('passError');
      const picError = document.getElementById('picError');
      
      // Clear previous errors
      userError.classList.remove('show');
      passError.classList.remove('show');
      picError.classList.remove('show');
      
      // Validate username
      if (userInput.value.length < 5 || userInput.value.length > 15) {
        userError.textContent = 'Username phải từ 5 đến 15 ký tự';
        userError.classList.add('show');
        isValid = false;
      }
      
      // Validate password
      const hasNumber = /[0-9]/.test(passInput.value);
      const hasLetter = /[a-zA-Z]/.test(passInput.value);
      
      if (!hasNumber || !hasLetter) {
        passError.textContent = 'Mật khẩu phải chứa cả số và chữ';
        passError.classList.add('show');
        isValid = false;
      }
      
      if (passInput.value.length < 4) {
        passError.textContent = 'Mật khẩu phải ít nhất 4 ký tự';
        passError.classList.add('show');
        isValid = false;
      }
      
      // Validate image
      if (picInput.files.length === 0) {
        picError.textContent = 'Vui lòng chọn ảnh đại diện';
        picError.classList.add('show');
        isValid = false;
      }
      
      // If all valid, show success message
      if (isValid) {
        successMsg.textContent = '✓ Đăng ký thành công!';
        successMsg.classList.add('show');
        
        // Reset form after 2 seconds
        setTimeout(() => {
          regForm.reset();
          imagePreview.classList.remove('show');
          successMsg.classList.remove('show');
          strengthDiv.className = '';
          strengthDiv.innerText = 'Độ mạnh: Yếu';
        }, 2000);
      }
    });
  </script>
</body>
</html>
